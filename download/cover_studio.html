<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #c83c54;
    --header-fill: #35444c;
    --text-primary: #1e2021;
    --text-muted: #6f7578;
    --icon: #4682a0;
    --border: #b1c3cc;
    --page-bg: #f3f4f5;
  }
  @page { size: 794px 1123px; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 794px; height: 1123px; margin: 0; padding: 0; background: #ffffff; font-family: 'Noto Sans SC', 'Inter', sans-serif; }
  .cover { position: relative; width: 100%; height: 100%; background: #ffffff; }

  /* Layer 1: Background - grid pattern */
  .bg-layer { position: absolute; inset: 0; overflow: hidden; z-index: 1; }
  .bg-grid { position: absolute; inset: 0; background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 50px 50px; opacity: 0.06;
  }

  /* Layer 2: Structure - thick vertical anchor line + horizontal dividers */
  .struct-layer { position: absolute; inset: 0; z-index: 2; }
  .vline { position: absolute; left: 0.10 * 794px; top: 8%; width: 6px; height: 84%; background: var(--header-fill); }
  .hline { position: absolute; left: 15%; right: 10%; top: 73%; height: 1px; background: var(--header-fill); opacity: 0.3; }

  /* Layer 3: Content */
  .content-layer { position: absolute; inset: 0; z-index: 3; padding: 0 10%; }

  /* Kicker */
  .kicker { position: absolute; top: 12%; left: calc(10% + 30px); font-size: 14pt; font-weight: 400;
    letter-spacing: 4pt; color: var(--text-muted); text-transform: uppercase; opacity: 0.6; }

  /* Hero Title */
  .hero { position: absolute; top: 22%; left: calc(10% + 30px); max-width: 75%; }
  .hero h1 { font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 52pt; font-weight: 800;
    line-height: 1.15; color: var(--text-primary); }
  .hero h1 span { color: var(--accent); }

  /* Summary */
  .summary { position: absolute; top: 50%; left: calc(10% + 30px); max-width: 60%;
    font-size: 15pt; font-weight: 400; line-height: 1.7; color: var(--text-muted); }

  /* Meta */
  .meta { position: absolute; top: 76%; left: calc(10% + 30px); }
  .meta p { font-size: 13pt; line-height: 2.0; color: var(--text-primary); font-weight: 400; }

  /* Footer */
  .footer { position: absolute; bottom: 6%; left: calc(10% + 30px); right: 10%;
    font-size: 12pt; color: var(--text-muted); opacity: 0.6; display: flex; justify-content: space-between; }

  /* Decorative accent mark */
  .accent-bar { position: absolute; top: 19%; left: calc(10% + 30px); width: 50px; height: 5px; background: var(--accent); }
</style>
</head>
<body>
<div class="cover">
  <div class="bg-layer"><div class="bg-grid"></div></div>
  <div class="struct-layer">
    <div class="vline"></div>
    <div class="hline"></div>
  </div>
  <div class="content-layer">
    <div class="accent-bar"></div>
    <div class="kicker">Architecture Design Document</div>
    <div class="hero">
      <h1>AI Agent<br><span>Studio</span></h1>
    </div>
    <div class="summary">
      基于Open Design核心架构模式深度映射，设计支持文字、图片、视频、音乐四大模态的AI创作平台。逐模式借鉴Agent-agnostic Adapter、Plugin-as-Filesystem、SSE Streaming、Critique Theater等11项架构范式。
    </div>
    <div class="meta">
      <p>2026 年 6 月</p>
      <p>架构设计文档 V1.0</p>
    </div>
    <div class="footer">
      <span>AI Agent Studio</span>
      <span>Z.ai</span>
    </div>
  </div>
</div>
</body>
</html>
