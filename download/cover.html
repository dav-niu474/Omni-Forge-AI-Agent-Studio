<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=794px, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&family=Carlito:wght@400;700&display=swap" rel="stylesheet">
<style>
@page { size: 794px 1123px; margin: 0; }
:root {
  --primary: #37474f;
  --accent: #b0273e;
  --bg: #ffffff;
  --text: #191b1c;
  --muted: #6e7478;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 794px;
  height: 1123px;
  margin: 0; padding: 0;
  background: var(--bg);
  font-family: 'Noto Sans SC', 'Carlito', sans-serif;
}
.cover {
  position: relative;
  width: 794px;
  height: 1123px;
  background: var(--bg);
}

/* Layer 1: Background - subtle grid */
.bg-layer {
  position: absolute; inset: 0;
  overflow: hidden; z-index: 1;
}
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(55,71,79,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(55,71,79,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
}

/* Layer 2: Structure - Swiss Grid lines */
.line-layer {
  position: absolute; inset: 0;
  z-index: 2;
  pointer-events: none;
}
.hline-top {
  position: absolute;
  left: 79px; right: 79px;
  top: 281px;
  height: 2px;
  background: var(--primary);
}
.hline-bottom {
  position: absolute;
  left: 79px; right: 79px;
  top: 842px;
  height: 2px;
  background: var(--primary);
}
.vline-mid {
  position: absolute;
  left: 357px;
  top: 281px;
  height: 561px;
  width: 2px;
  background: var(--primary);
}

/* Layer 3: Content */
.text-layer {
  position: absolute; inset: 0;
  z-index: 3;
  pointer-events: none;
}

/* Zone A - Kicker */
.zone-a {
  position: absolute;
  left: 95px;
  top: 185px;
  width: 600px;
}
.kicker {
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  opacity: 0.6;
}

/* Zone B - Hero Title */
.zone-b {
  position: absolute;
  left: 95px;
  top: 315px;
  width: 250px;
  height: 500px;
}
.hero-title {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 52px;
  font-weight: 900;
  line-height: 1.2;
  color: var(--text);
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* Zone C - Summary */
.zone-c {
  position: absolute;
  left: 385px;
  top: 315px;
  width: 335px;
  height: 500px;
}
.summary {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text);
  opacity: 0.85;
}
.summary .accent-word {
  color: var(--accent);
  font-weight: 700;
}

/* Zone D - Footer */
.zone-d {
  position: absolute;
  left: 95px;
  right: 95px;
  top: 875px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-left {
  font-size: 16px;
  color: var(--muted);
  opacity: 0.6;
  letter-spacing: 1px;
}
.footer-right {
  font-size: 16px;
  color: var(--muted);
  opacity: 0.6;
  letter-spacing: 1px;
}

/* Accent dot */
.accent-dot {
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  margin-right: 10px;
  vertical-align: middle;
}
</style>
<style>
@media screen {
  html { height: auto; display: flex; justify-content: center; }
  body { transform-origin: top center; scale: min(1, calc(100vh / 1123)); margin: 0 auto; }
}
</style>
</head>
<body>
<div class="cover">
  <!-- Layer 1: Background grid -->
  <div class="bg-layer">
    <div class="bg-grid"></div>
  </div>

  <!-- Layer 2: Swiss Grid structure lines -->
  <div class="line-layer">
    <div class="hline-top"></div>
    <div class="hline-bottom"></div>
    <div class="vline-mid"></div>
  </div>

  <!-- Layer 3: Content -->
  <div class="text-layer">
    <!-- Zone A: Kicker -->
    <div class="zone-a">
      <div class="kicker">PROJECT ARCHITECTURE ANALYSIS</div>
    </div>

    <!-- Zone B: Hero Title -->
    <div class="zone-b">
      <div class="hero-title">Open<br>Design<br>架构<br>分析</div>
    </div>

    <!-- Zone C: Summary -->
    <div class="zone-c">
      <div class="summary">
        <span class="accent-word">Agent 时代</span>的开源设计引擎，兼容 21 种 AI 编码工具的本地优先架构深度剖析。<br><br>
        涵盖三层架构设计、14 层提示词组合系统、声明式插件流水线、AI 多专家评审机制，以及 261 个官方插件与 150 套品牌设计系统构建的完整生态。<br><br>
        基于 pnpm Monorepo + TypeScript 全栈工程实践，从守护进程到 Electron 桌面端的完整技术解析。
      </div>
    </div>

    <!-- Zone D: Footer -->
    <div class="zone-d">
      <div class="footer-left"><span class="accent-dot"></span>2026.06</div>
      <div class="footer-right">nexu-io/open-design v0.10.0</div>
    </div>
  </div>
</div>
</body>
</html>
